services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: equitytracker-api
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./rentefond.db}
      APP_ENV: ${APP_ENV:-development}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      PROJECT_NAME: ${PROJECT_NAME:-EquityTracker Backend}
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: equitytracker-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-equitytracker}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    profiles: ["postgres"]
    restart: unless-stopped

volumes:
  postgres_data:
