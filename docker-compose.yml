services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fundtracker-app
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/equitytracker
      FRONTEND_DIST_DIR: /app/frontend-dist
      APP_ENV: production
      API_V1_PREFIX: /api/v1
      PROJECT_NAME: Fundtracker
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: fundtracker-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-equitytracker}
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-equitytracker}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
